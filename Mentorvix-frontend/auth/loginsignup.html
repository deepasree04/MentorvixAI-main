<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorVix AI - Login & Signup</title>
  <link rel="stylesheet" href="{% static 'auth/styleloginsignup.css' %}">
  <link rel="stylesheet" href="{% static 'shared/global.css' %}">
</head>

<body>

  <a href="javascript:history.back()" class="mv-back-btn">← Back</a>

  <div class="wrapper mv-fade-in">

    <!-- TITLE -->
    <div class="title-text">
      <div class="title login">Login</div>
      <div class="title signup">Signup</div>
    </div>

    <!-- FORM CONTAINER -->
    <div class="form-container">

      <!-- SLIDER BUTTONS -->
      <div class="slide-controls">
        <input type="radio" name="slide" id="login" checked>
        <input type="radio" name="slide" id="signup">

        <label for="login" class="slide login">Login</label>
        <label for="signup" class="slide signup">Signup</label>

        <div class="slider-tab"></div>
      </div>

      <!-- FORMS -->
      <div class="form-inner">

        <!-- ================= LOGIN FORM ================= -->
        <form class="login" id="loginForm">

          <div class="field">
            <input id="loginEmail" type="text" placeholder="Username" required>
          </div>

          <div class="field">
            <input id="loginPassword" type="password" placeholder="Password" required>
          </div>

          <div class="pass-link">
            <a href="#">Forgot password?</a>
          </div>

          <!-- Inline message area -->
          <div id="loginMessage" class="form-message"></div>

          <div class="field btn">
            <div class="btn-layer"></div>
            <input type="submit" value="Login" id="loginBtn">
          </div>

          <div class="signup-link">
            Not a member? <a href="#">Signup now</a>
          </div>

        </form>

        <!-- ================= SIGNUP FORM ================= -->
        <form class="signup" id="signupForm">

          <div class="field">
            <input id="signupUsername" type="text" placeholder="Username" required>
          </div>

          <div class="field">
            <input id="signupEmail" type="email" placeholder="Email Address" required>
          </div>

          <div class="field">
            <input id="signupPassword" type="password" placeholder="Password" required>
          </div>

          <div class="field">
            <input id="signupConfirm" type="password" placeholder="Confirm password" required>
          </div>

          <!-- Inline message area -->
          <div id="signupMessage" class="form-message"></div>

          <div class="field btn">
            <div class="btn-layer"></div>
            <input type="submit" value="Signup" id="signupBtn">
          </div>

        </form>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mv-footer" style="position: fixed; bottom: 0; left: 0; right: 0; margin-top: 0;">
    <div class="mv-footer-inner">
      <div class="mv-footer-brand">
        <h3>MentorVix-AI</h3>
        <p>AI-powered career guidance for students</p>
      </div>
      <div class="mv-footer-links">
        <a href=" {% static 'home_page/home.html' %}">Home</a>
      </div>
      <p class="mv-footer-copy">© 2026 MentorVix AI — All Rights Reserved</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="{% static 'auth/loginsignup.js' %} "></script>defer></script>

</body>

</html>
